name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Build
      run: g++ -std=c++17 -o c-- *.cpp

    - name: Test all inputs
      run: python3 run_all_inputs.py
