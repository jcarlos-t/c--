name: Build & Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y g++ gcc

    - name: Build static binary
      run: |
        g++ -std=c++17 -Wall -Wextra -O2 -static -o c-- *.cpp
        file c--
        ls -lh c--

    - name: Smoke test
      run: |
        ./c-- tests/integracion/test01_funciones.cnn --codegen > /dev/null
        echo "Smoke test passed"

    - name: Determine tag and create release
      id: release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set -e
        if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
          VERSION="${GITHUB_REF_NAME}"
        else
          VERSION="ci-$(date +%Y%m%d)-${{ github.run_number }}"
        fi
        echo "version=${VERSION}" >> $GITHUB_OUTPUT

        # Check if release already exists for this tag
        if gh release view "$VERSION" --repo "${{ github.repository }}" &>/dev/null; then
          echo "Release $VERSION already exists, deleting..."
          gh release delete "$VERSION" --repo "${{ github.repository }}" --yes || true
        fi

        # Create release and upload binary
        gh release create "$VERSION" \
          --repo "${{ github.repository }}" \
          --title "Release $VERSION" \
          --notes "Compilador c-- para Linux x86_64. Construido desde ${{ github.sha }}." \
          "./c--#c--"

        echo "Release $VERSION created successfully"

  # Rebuilds the Vercel Sandbox snapshot used by compi-web (gcc + the compiler
  # binary pre-installed) so user code runs without paying that setup cost on
  # every execution. Runs as its own job so a failure here is reported
  # separately and never reverts the release published above.
  update-sandbox-snapshot:
    needs: release
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
      COMPILER_BIN_URL: ${{ secrets.COMPILER_BIN_URL }}
      # Lets the Vercel CLI resolve the target project non-interactively (no `vercel link`).
      VERCEL_ORG_ID: ${{ secrets.VERCEL_TEAM_ID }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install @vercel/sandbox
      working-directory: .github/scripts
      run: |
        npm init -y > /dev/null
        npm install @vercel/sandbox

    - name: Create sandbox snapshot
      id: snapshot
      working-directory: .github/scripts
      run: |
        set -e
        SNAPSHOT_ID="$(node create-sandbox-snapshot.mjs | tail -n1)"
        echo "snapshot_id=${SNAPSHOT_ID}" >> "$GITHUB_OUTPUT"

    - name: Update SANDBOX_SNAPSHOT_ID on compi-web (production)
      env:
        SNAPSHOT_ID: ${{ steps.snapshot.outputs.snapshot_id }}
      run: |
        set -e
        npx vercel@latest env rm SANDBOX_SNAPSHOT_ID production --token="$VERCEL_TOKEN" --yes || true
        echo -n "$SNAPSHOT_ID" | npx vercel@latest env add SANDBOX_SNAPSHOT_ID production --token="$VERCEL_TOKEN"

    - name: Trigger Vercel redeploy for compi-web
      run: |
        curl -fsSL -X POST "$VERCEL_DEPLOY_HOOK_URL"
