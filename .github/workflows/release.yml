name: Build & Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y g++ gcc libc6-dev

    - name: Build static binary
      run: |
        g++ -std=c++17 -Wall -Wextra -O2 -static -o c-- *.cpp

    - name: Smoke test
      run: |
        cat > /tmp/smoke.cnn << 'EOF'
int main() {
  printf(42);
  return 0;
}
EOF
        ./c-- /tmp/smoke.cnn --codegen > /dev/null
        echo "Smoke test passed"

    - name: Determine tag
      id: tag
      run: |
        if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
          echo "version=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
        else
          echo "version=ci-$(date +%Y%m%d)-${{ github.run_number }}" >> $GITHUB_OUTPUT
        fi

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.tag.outputs.version }}
        name: Release ${{ steps.tag.outputs.version }}
        body: |
          Compilador c-- para Linux x86_64.
          Construido automáticamente desde ${{ github.sha }}.
        files: c--
        fail_on_unmatched_files: true
        generate_release_notes: false

    - name: Trigger Vercel redeploy (optional)
      env:
        VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
      run: |
        if [ -n "$VERCEL_DEPLOY_HOOK_URL" ]; then
          curl -X POST "$VERCEL_DEPLOY_HOOK_URL" || echo "Deploy hook call failed (non-blocking)"
        else
          echo "VERCEL_DEPLOY_HOOK_URL not set, skipping redeploy"
        fi
