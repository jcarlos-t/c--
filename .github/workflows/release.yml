name: Build & Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y g++ gcc

    - name: Build static binary
      run: |
        g++ -std=c++17 -Wall -Wextra -O2 -static -o c-- *.cpp
        file c--
        ls -lh c--

    - name: Smoke test
      run: |
        ./c-- tests/integracion/test01_funciones.cnn --codegen > /dev/null
        echo "Smoke test passed"

    - name: Determine tag and create release
      id: release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set -e
        if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
          VERSION="${GITHUB_REF_NAME}"
        else
          VERSION="ci-$(date +%Y%m%d)-${{ github.run_number }}"
        fi
        echo "version=${VERSION}" >> $GITHUB_OUTPUT

        # Check if release already exists for this tag
        if gh release view "$VERSION" --repo "${{ github.repository }}" &>/dev/null; then
          echo "Release $VERSION already exists, deleting..."
          gh release delete "$VERSION" --repo "${{ github.repository }}" --yes || true
        fi

        # Create release and upload binary
        gh release create "$VERSION" \
          --repo "${{ github.repository }}" \
          --title "Release $VERSION" \
          --notes "Compilador c-- para Linux x86_64. Construido desde ${{ github.sha }}." \
          "./c--#c--"

        echo "Release $VERSION created successfully"

    - name: Trigger Vercel redeploy (optional)
      env:
        VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
      run: |
        if [ -n "$VERCEL_DEPLOY_HOOK_URL" ]; then
          curl -s -X POST "$VERCEL_DEPLOY_HOOK_URL" || echo "Deploy hook call failed (non-blocking)"
        else
          echo "VERCEL_DEPLOY_HOOK_URL not set, skipping redeploy"
        fi
